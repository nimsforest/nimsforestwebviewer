{{define "content"}}
<div class="mb-6">
    <a href="/trees" class="text-forest-green hover:text-forest-green/80 text-sm">&larr; Back to Trees</a>
</div>

<div class="flex justify-center">
    <div class="w-72 bg-forest-darker rounded-2xl border border-forest-green/20 overflow-hidden">
        <div class="bg-gradient-to-b from-forest-green/20 to-transparent pt-8 pb-4 text-center">
            <span class="text-6xl">&#x1F333;</span>
        </div>
        <div class="px-6 pb-6">
            <h1 class="text-xl font-bold text-white text-center mb-1">{{.Data.Process.Name}}</h1>
            <div class="text-xs text-forest-green text-center mb-4">Tree</div>
            <div class="border-t border-forest-green/10 pt-4 space-y-3 text-sm">
                <div class="flex justify-between">
                    <span class="text-gray-500">RAM</span>
                    <span class="text-white font-medium">{{formatBytes .Data.Process.RAMAllocated}}</span>
                </div>
                <div class="flex justify-between">
                    <span class="text-gray-500">Land</span>
                    <span class="text-white font-medium">{{if .Data.Land}}{{.Data.Land.Hostname}}{{else}}{{.Data.Process.LandID}}{{end}}</span>
                </div>
                <div class="flex justify-between">
                    <span class="text-gray-500">Started</span>
                    <span class="text-white font-medium">{{timeAgo .Data.Process.StartedAt}}</span>
                </div>
            </div>
        </div>
    </div>
</div>
{{end}}
