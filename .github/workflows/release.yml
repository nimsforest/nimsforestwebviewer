name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build all platforms
        run: |
          VERSION="${{ github.ref_name }}"
          LDFLAGS="-s -w -X main.version=${VERSION}"

          GOOS=linux  GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o nimsforestwebviewer-linux-amd64   ./cmd/nimsforestwebviewer
          GOOS=linux  GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o nimsforestwebviewer-linux-arm64   ./cmd/nimsforestwebviewer
          GOOS=darwin GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o nimsforestwebviewer-darwin-amd64  ./cmd/nimsforestwebviewer
          GOOS=darwin GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o nimsforestwebviewer-darwin-arm64  ./cmd/nimsforestwebviewer

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: nimsforestwebviewer-*
          generate_release_notes: true

  docker:
    runs-on: ubuntu-latest
    needs: release
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Login to registry.nimsforest.com via GitHub OIDC
        run: |
          OIDC=$(curl -sfH "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=registry.nimsforest.com" | jq -r '.value')
          echo "$OIDC" | docker login registry.nimsforest.com -u oidc --password-stdin

      - name: Build and push Docker image
        run: |
          VERSION="${{ github.ref_name }}"
          docker build --no-cache --build-arg VERSION=${VERSION} -t registry.nimsforest.com/nimsforestwebviewer:${VERSION} -t registry.nimsforest.com/nimsforestwebviewer:latest .
          docker push registry.nimsforest.com/nimsforestwebviewer:${VERSION}
          docker push registry.nimsforest.com/nimsforestwebviewer:latest
